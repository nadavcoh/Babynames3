name: Deploy to dev server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Trigger deployment webhook (https with http fallback)
        run: |
          HOST="hamusim.puma-kettle.ts.net"
          PORT="5003"

          do_curl() {
            local url="$1"
            curl -s \
              -o response.json \
              -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -d '{}' \
              --max-time 15 \
              "$url" 2>/dev/null
          }

          echo "Trying HTTPS..."
          CODE=$(do_curl "https://$HOST:$PORT/webhook") || CODE=""

          if [ "$CODE" = "200" ]; then
            echo "HTTPS deploy succeeded (HTTP $CODE)"
          else
            echo "HTTPS failed (code='$CODE'), falling back to HTTP..."
            CODE=$(do_curl "http://$HOST:$PORT/webhook") || CODE=""
            if [ "$CODE" = "200" ]; then
              echo "HTTP deploy succeeded (HTTP $CODE)"
            else
              echo "Both HTTPS and HTTP failed. Last status code: $CODE"
              echo "Server response:"
              cat response.json 2>/dev/null || true
              exit 1
            fi
          fi

          echo "Server response:"
          cat response.json
